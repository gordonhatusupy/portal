name: Update Homebrew Cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    name: Update tap with new version
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        shell: bash
        run: sleep 30

      - name: Download DMG and compute SHA256
        id: sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/${GITHUB_REF_NAME}/Portal-macOS.dmg"
          curl -fSL -o Portal-macOS.dmg "$DMG_URL"
          SHA256=$(shasum -a 256 Portal-macOS.dmg | awk '{print $1}')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: gordonhatusupy/homebrew-portal
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update cask formula
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          sed -i 's/version ".*"/version "${{ steps.sha.outputs.version }}"/' Casks/portal.rb
          sed -i 's/sha256 ".*"/sha256 "${{ steps.sha.outputs.sha256 }}"/' Casks/portal.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/portal.rb
          git commit -m "Update Portal to ${{ steps.sha.outputs.version }}"
          git push
