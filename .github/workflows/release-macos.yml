name: Release macOS

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build, notarize, and publish
    runs-on: macos-latest
    env:
      APP_NAME: Portal
      DIST_DIR: dist
      DERIVED_DATA_PATH: .derivedData-release
      CERTIFICATE_PATH: ${{ runner.temp }}/portal-certificate.p12
      KEYCHAIN_PATH: ${{ runner.temp }}/portal-signing.keychain-db
      NOTARY_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Decode signing certificate
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          raw = os.environ["MACOS_CERTIFICATE_P12_BASE64"]
          Path(os.environ["CERTIFICATE_PATH"]).write_bytes(base64.b64decode(raw))
          PY
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}

      - name: Create temporary keychain and import certificate
        shell: bash
        run: |
          set -euo pipefail
          security create-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.MACOS_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "${{ secrets.MACOS_KEYCHAIN_PASSWORD }}" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Write App Store Connect API key
        shell: bash
        run: |
          set -euo pipefail
          printf '%s' "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}" > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

      - name: Ensure release script is executable
        shell: bash
        run: chmod +x scripts/release-macos.sh

      - name: Build, sign, and notarize release
        env:
          DEVELOPMENT_TEAM: ${{ secrets.MACOS_TEAM_ID }}
          DEVELOPER_ID_APPLICATION: ${{ secrets.MACOS_DEVELOPER_ID_APPLICATION }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
          NOTARYTOOL_KEY_PATH: ${{ env.NOTARY_KEY_PATH }}
          NOTARYTOOL_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          NOTARYTOOL_ISSUER: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: ./scripts/release-macos.sh

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Portal-macOS.zip
            dist/Portal-macOS.dmg
          generate_release_notes: true
