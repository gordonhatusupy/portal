name: Security

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "21 4 * * 1"

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan tracked files for common secret patterns
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import re
          import subprocess
          import sys
          from pathlib import Path

          patterns = {
              "private_key": re.compile(r"BEGIN (?:RSA|OPENSSH|EC|DSA|PGP)? ?PRIVATE KEY"),
              "aws_access_key": re.compile(r"AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}"),
              "github_token": re.compile(r"ghp_[A-Za-z0-9]{20,}|github_pat_[A-Za-z0-9_]{20,}"),
              "google_api_key": re.compile(r"AIza[0-9A-Za-z\\-_]{20,}"),
              "slack_token": re.compile(r"xox[baprs]-[A-Za-z0-9\\-]{10,}"),
              "openai_key": re.compile(r"sk-[A-Za-z0-9]{20,}"),
              "generic_assignment": re.compile(
                  r"\\b(?:SECRET|TOKEN|PASSWORD|API_KEY|ACCESS_KEY)\\b\\s*[:=]\\s*[\"'][^\"']+[\"']"
              ),
          }

          ignored_prefixes = (
              "AppResources/Assets.xcassets/",
              "public/",
          )

          files = subprocess.check_output(["git", "ls-files"], text=True).splitlines()
          findings = []

          for rel_path in files:
              if rel_path.startswith(ignored_prefixes):
                  continue

              path = Path(rel_path)
              try:
                  data = path.read_text(encoding="utf-8", errors="ignore")
              except Exception:
                  continue

              for name, pattern in patterns.items():
                  for match in pattern.finditer(data):
                      line = data.count("\n", 0, match.start()) + 1
                      findings.append(f"{rel_path}:{line}: {name}: {match.group(0)[:120]}")

          if findings:
              print("Potential secrets detected:")
              for finding in findings:
                  print(f"  - {finding}")
              sys.exit(1)

          print("No secret patterns detected.")
          PY

  codeql:
    name: CodeQL
    runs-on: macos-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - swift
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
