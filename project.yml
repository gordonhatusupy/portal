name: Portal
options:
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_VERSION: "6.0"
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
targets:
  PortalCore:
    type: framework
    platform: macOS
    sources:
      - path: Sources/PortalCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.portal.PortalCore
        PRODUCT_NAME: PortalCore
        GENERATE_INFOPLIST_FILE: YES
        SKIP_INSTALL: YES
        DEFINES_MODULE: YES

  Portal:
    type: application
    platform: macOS
    sources:
      - path: Sources/Portal
      - path: AppResources/Assets.xcassets
    dependencies:
      - target: PortalCore
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.portal.Portal
        PRODUCT_NAME: Portal
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_KEY_CFBundleDisplayName: Portal
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: NO
    scheme:
      testTargets:
        - PortalTests

  PortalTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/PortalCoreTests
    dependencies:
      - target: PortalCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.portal.PortalTests
        PRODUCT_NAME: PortalTests
        GENERATE_INFOPLIST_FILE: YES
